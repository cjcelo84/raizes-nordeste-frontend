<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raízes do Nordeste – Cardápio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="totem-header" style="display:none;">🖥️ TOTEM DE AUTOATENDIMENTO</div>

<header class="header">
  <a href="index.html" class="header__logo">
    <div class="header__logo-icon">🌵</div>
    <div>Raízes do Nordeste<span id="unidade-label">Cardápio</span></div>
  </a>
  <div class="header__actions">
    <button class="btn-icon" onclick="irPara('login.html')" title="Minha Conta">👤</button>
    <button class="btn-icon" onclick="irPara('carrinho.html')" title="Carrinho">
      🛒<span class="badge" id="cart-badge" style="display:none;">0</span>
    </button>
  </div>
</header>

<nav class="desktop-nav">
  <a href="index.html">Início</a>
  <a href="cardapio.html" class="active">Cardápio</a>
  <a href="fidelidade.html">Fidelidade</a>
  <a href="acompanhamento.html">Meu Pedido</a>
  <a href="login.html">Entrar</a>
</nav>

<main class="container">

  <!-- PROMOÇÃO DESTAQUE -->
  <div class="promo-card mt-16">
    <span class="promo-card__badge">🔥 HOJE</span>
    <div class="promo-card__title">Combo do Dia com –20%!</div>
    <div class="promo-card__desc">Qualquer Combo do cardápio com desconto especial.</div>
  </div>

  <!-- BUSCA -->
  <div class="form-group">
    <input type="search" id="busca" class="form-control" placeholder="🔍  Buscar item no cardápio..." oninput="filtrar()">
  </div>

  <!-- FILTRO POR CATEGORIA -->
  <div class="chips" id="chips-categorias"></div>

  <!-- GRID DE PRODUTOS -->
  <div class="product-grid" id="lista-produtos"></div>

  <!-- EMPTY STATE -->
  <div id="empty-state" class="text-center hidden" style="padding:40px 0;">
    <div style="font-size:3rem;">🔍</div>
    <div class="page-title mt-8">Nenhum item encontrado</div>
    <div class="text-muted">Tente outra categoria ou palavra-chave.</div>
  </div>

</main>

<!-- CARRINHO FLUTUANTE (aparece quando há itens) -->
<div id="carrinho-fab" class="hidden" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:90;width:90%;max-width:380px;">
  <button class="btn btn-success" onclick="irPara('carrinho.html')">
    🛒 Ver Carrinho (<span id="fab-qtd">0</span> itens) · <span id="fab-total">R$ 0,00</span>
  </button>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="bottom-nav__item"><span class="icon">🏠</span>Início</a>
  <a href="cardapio.html" class="bottom-nav__item active"><span class="icon">🍽️</span>Cardápio</a>
  <a href="fidelidade.html" class="bottom-nav__item"><span class="icon">⭐</span>Fidelidade</a>
  <a href="acompanhamento.html" class="bottom-nav__item"><span class="icon">📦</span>Pedido</a>
  <a href="login.html" class="bottom-nav__item"><span class="icon">👤</span>Conta</a>
</nav>

<script src="js/dados.js"></script>
<script src="js/app.js"></script>
<script>
  let categoriaAtiva = 'Todos';

  function renderCategorias() {
    const container = document.getElementById('chips-categorias');
    container.innerHTML = DADOS.categorias.map(c => `
      <button class="chip ${c === categoriaAtiva ? 'active' : ''}"
        onclick="selecionarCategoria('${c}')">${c}</button>
    `).join('');
  }

  function selecionarCategoria(cat) {
    categoriaAtiva = cat;
    renderCategorias();
    filtrar();
  }

  function filtrar() {
    const termo = document.getElementById('busca').value.toLowerCase();
    let itens = DADOS.cardapio;

    if (categoriaAtiva !== 'Todos') {
      itens = itens.filter(p => p.categoria === categoriaAtiva);
    }
    if (termo) {
      itens = itens.filter(p =>
        p.nome.toLowerCase().includes(termo) ||
        p.descricao.toLowerCase().includes(termo)
      );
    }

    renderProdutos(itens);
    document.getElementById('empty-state').classList.toggle('hidden', itens.length > 0);
  }

  function renderProdutos(lista) {
    const carrinho = getCarrinho();
    const container = document.getElementById('lista-produtos');

    container.innerHTML = lista.map(p => {
      const itemNoCarrinho = carrinho.find(i => i.id === p.id);
      const qtd = itemNoCarrinho ? itemNoCarrinho.qtd : 0;

      return `
        <div class="product-card ${!p.disponivel ? 'indisponivel' : ''}">
          <div class="product-card__img">${p.emoji}</div>
          <div class="product-card__info">
            ${p.destaque ? '<span class="product-card__badge">⭐ Destaque</span>' : ''}
            <div class="product-card__name">${p.nome}</div>
            <div class="product-card__desc">${p.descricao}</div>
            <div class="product-card__footer">
              <span class="product-card__price">${formatarPreco(p.preco)}</span>
              ${!p.disponivel
                ? '<span class="product-card__unavail">Indisponível</span>'
                : qtd === 0
                  ? `<button class="add-btn" onclick="adicionar(${p.id})">+ Adicionar</button>`
                  : `<div class="qty-control">
                       <button class="qty-btn minus" onclick="remover(${p.id})">−</button>
                       <span class="qty-num">${qtd}</span>
                       <button class="qty-btn plus" onclick="adicionar(${p.id})">+</button>
                     </div>`
              }
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function adicionar(id) {
    const produto = DADOS.cardapio.find(p => p.id === id);
    if (produto) {
      adicionarAoCarrinho(produto);
      filtrar();
      atualizarFAB();
    }
  }

  function remover(id) {
    removerDoCarrinho(id);
    filtrar();
    atualizarFAB();
  }

  function atualizarFAB() {
    const qtd = qtdCarrinho();
    const fab = document.getElementById('carrinho-fab');
    document.getElementById('fab-qtd').textContent = qtd;
    document.getElementById('fab-total').textContent = formatarPreco(totalCarrinho());
    fab.classList.toggle('hidden', qtd === 0);
  }

  /* Ajustar bottom do FAB no modo totem */
  if (getModo() === 'totem') {
    document.getElementById('carrinho-fab').style.bottom = '20px';
  }

  renderCategorias();
  filtrar();
  atualizarFAB();
</script>
</body>
</html>
